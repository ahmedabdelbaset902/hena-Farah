<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Luxury Wedding Invitation</title>

    <!-- =========================
         PRECONNECT (CRITICAL)
    ========================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- =========================
         GOOGLE FONTS
    ========================== -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- ✅ الخط اللي كان ناقص -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

    <!-- =========================
         FONT AWESOME (non-blocking)
    ========================== -->
    <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        onload="this.onload=null;this.rel='stylesheet'">

    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </noscript>

    <!-- =========================
         CSS (CRITICAL FIRST)
    ========================== -->

    <!-- Base -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- Lazy CSS -->
    <link rel="preload" as="style" href="styles/hreo.css" onload="this.rel='stylesheet'">
    <link rel="preload" as="style" href="styles/countdown.css" onload="this.rel='stylesheet'">
    <link rel="preload" as="style" href="styles/eventDetails.css" onload="this.rel='stylesheet'">
    <link rel="preload" as="style" href="styles/schedule.css" onload="this.rel='stylesheet'">
    <link rel="preload" as="style" href="styles/thanks.css" onload="this.rel='stylesheet'">
    <link rel="preload" as="style" href="styles/footer.css" onload="this.rel='stylesheet'">
    <link rel="preload" as="style" href="styles/guest.css" onload="this.rel='stylesheet'">

    <!-- fallback لو JS مقفول -->
    <noscript>
        <link rel="stylesheet" href="styles/hreo.css">
        <link rel="stylesheet" href="styles/countdown.css">
        <link rel="stylesheet" href="styles/eventDetails.css">
        <link rel="stylesheet" href="styles/schedule.css">
        <link rel="stylesheet" href="styles/thanks.css">
        <link rel="stylesheet" href="styles/footer.css">
        <link rel="stylesheet" href="styles/guest.css">
    </noscript>

</head>

<body>

    <!-- MUSIC PLAYER -->

    <div class="music-player">

        <button id="musicBtn">

            <div class="music-disc">
                <i class="fa-solid fa-music"></i>
            </div>

        </button>

        <audio id="bgMusic" preload="auto" playsinline webkit-playsinline>
            <source src="music1.mp3" type="audio/mpeg">
        </audio>

    </div>



    <div class="scene">
        <video id="bgVideo" class="bg-video" muted playsinline webkit-playsinline preload="metadata"
            disablepictureinpicture controlslist="nodownload noplaybackrate noremoteplayback" poster="imges/poster.jpg">

            <source src="imges/Back1.mp4" type="video/mp4">
        </video>
    </div>

    <!-- MAIN PAGE -->
    <section class="main" id="main">

        <section class="hero">

            <!-- CONTENT -->
            <div class="hero-content">


                <div class="date-box">
                    Jun 5 th, 2026
                </div>

                <button class="save-btn" onclick="addToCalendar()">
                    Save The Date
                </button>



                <div class="arabic">قاعة دايموند ، قطور ، الغربية</div>

            </div>



        </section>

        <!-- =========================
         COUNTDOWN
    ========================== -->

        <section class="countdown" style="margin-bottom:200px;">

            <div class="countdown-title">
                <h2 class="countdown-title">فاضل كام يوم ونولعها</h2>
            </div>

            <div class="timer">

                <div class="time-box">
                    <h3 id="days">00</h3>
                    <span>يوم</span>
                </div>

                <div class="time-box">
                    <h3 id="hours">00</h3>
                    <span>ساعة</span>
                </div>

                <div class="time-box">
                    <h3 id="minutes">00</h3>
                    <span>دقيقة</span>
                </div>

                <div class="time-box">
                    <h3 id="seconds">00</h3>
                    <span>ثانية</span>
                </div>

            </div>

            <!-- الصورة تحت العداد مباشرة -->
            <div class="countdown-image">
                <img src="./imges/download (1).png" alt="">
            </div>

        </section>

        <!-- =========================
     EVENT DETAILS
========================== -->
        <section class="event-section">



            <img src="./imges/date2.png" alt="" class="img-date">


            <!-- SECTION TITLE -->
            <div class="section-title">
                <h2>المـــكــان</h2>
            </div>

            <div class="card">

                <!-- CONTENT -->
                <div class="content">

                    <div class="img-hall">
                        <img src="./imges/hallImage.jpg" alt="">
                    </div>


                    <div class="arabic">قاعة كيلوباترا ، قطور ، الغربية</div>

                    <a href="https://maps.google.com/?q=قاعة+دايموند+قطور+الغربية" target="_blank" class="btn">
                        Get Directions ↗
                    </a>

                </div>

            </div>

            <!-- MAP -->
            <div class="map-box">

                <iframe src="https://www.google.com/maps?q=قاعة+دايموند+قطور+الغربية&output=embed" allowfullscreen
                    loading="lazy">
                </iframe>

            </div>

        </section>


        <div class="frends-image">
            <img src="./imges/friends.png" alt="">
        </div>



        <!-- =========================
         guest
    ========================== -->

        <section class="rsvp-section">

            <h2 class="rsvp-title">Together With You</h2>
            <p class="rsvp-sub">♥️We can’t wait to celebrate with you </p>

            <form class="rsvp-form" id="rsvpForm" autocomplete="off">

                <!-- NAME -->
                <input type="text" id="name" placeholder="الاسم" required autocomplete="name">

                <!-- GUESTS COUNTER -->
                <div class="guests-counter">

                    <span>عدد المرافقين</span>

                    <div class="counter">

                        <button type="button" class="minus" aria-label="decrease guests">−</button>

                        <input type="number" id="guests" value="1" min="1" max="10" inputmode="numeric">

                        <button type="button" class="plus" aria-label="increase guests">+</button>

                    </div>

                </div>
                <select id="attendance" required>

                    <option value="" disabled selected>
                        هل ستشرفنا بحضوركم؟
                    </option>

                    <option value="yes">
                        نعم، سأكون سعيدًا بالحضور
                    </option>

                    <option value="no">
                        أعتذر عن عدم التمكن من الحضور
                    </option>

                </select>

                <button type="submit" id="submitBtn">
                    تأكيد الرد
                </button>

            </form>

        </section>
        <!-- =========================
     THANK YOU
========================== -->

        <section>

            <div class="thanks" id="thanks">

                <h2 id="thanksTitle">
                    See You Here
                </h2>

                <p id="thanksEn"></p>

                <div id="thanksAr" class="thanks-ar"></div>

            </div>

        </section>

        <!-- =========================
         FOOTER
    ========================== -->

        <footer>

            M & M Wedding Invitation © 2026

        </footer>


    </section>


    <!-- =========================
     GSAP (non-blocking)
========================= -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>

    <!-- =========================
     MAIN SCRIPTS (deferred)
========================= -->

    <script src="scripts/script.js" defer></script>
    <script src="scripts/countdown.js" defer></script>
    <script src="scripts/schedule.js" defer></script>
    <script src="scripts/guest.js" defer></script>
    <script src="scripts/thanks.js" defer></script>

</body>

</html>
